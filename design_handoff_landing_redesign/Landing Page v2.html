<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyGameON — Katalog Game PC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #0D0F14;
      color: #F3F4F6;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    p { text-wrap: pretty; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #1F2937; border-radius: 2px; }

    /* ── Animations ─────────────────────────── */
    @keyframes marqueeScroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-33.333%); }
    }
    @keyframes glowFloat {
      0%, 100% { opacity: 0.5; transform: scale(1) translateY(0); }
      50% { opacity: 0.8; transform: scale(1.06) translateY(-12px); }
    }
    @keyframes heroIn {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .anim-hero-in {
      animation: heroIn 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    .anim-hero-in-delay {
      animation: heroIn 0.8s 0.15s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    .anim-hero-in-delay2 {
      animation: heroIn 0.8s 0.3s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .reveal-el {
      opacity: 0;
      transform: translateY(22px);
      transition: opacity 0.6s cubic-bezier(0.22, 1, 0.36, 1),
                  transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .reveal-el.visible { opacity: 1; transform: translateY(0); }

    .nav-blur {
      backdrop-filter: blur(24px) saturate(200%);
      -webkit-backdrop-filter: blur(24px) saturate(200%);
    }
    .game-card-hover {
      transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
    }
    .game-card-hover:hover { transform: translateY(-4px); }
    .btn-yellow { transition: filter 0.15s ease, transform 0.1s ease; }
    .btn-yellow:hover { filter: brightness(0.92); }
    .btn-yellow:active { transform: scale(0.97); }

    .nav-link-item { transition: color 0.15s, background 0.15s; }
    .nav-link-item:hover { color: #F3F4F6 !important; background: rgba(255,255,255,0.05); }

    .dot-grid {
      background-image: radial-gradient(circle, rgba(255,209,0,0.08) 1px, transparent 1px);
      background-size: 32px 32px;
    }

    /* ── Responsive ─────────────────────────── */
    @media (max-width: 900px) {
      .nav-links { display: none !important; }
      .winning-card { grid-template-columns: 1fr !important; }
      .bento-grid { grid-template-columns: 1fr 1fr !important; }
      .bento-grid .s-item { grid-column: auto !important; grid-row: auto !important; }
    }
    @media (max-width: 600px) {
      .bento-grid { grid-template-columns: 1fr !important; }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="lp-hero.jsx"></script>
<script type="text/babel" src="lp-sections.jsx"></script>
<script type="text/babel">

/* ── Tweak defaults ─────────────────────────── */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "showMarquee": true,
  "showWinning": true,
  "showBlog": true,
  "accentMode": "purple"
}/*EDITMODE-END*/;

/* ── Contact Section (inline, simple) ───────── */
const ContactSection = () => (
  <section id="contact" style={{ maxWidth: 1200, margin: '0 auto', padding: '0 24px 72px' }}>
    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }} className="winning-card">
      <div style={{ background: '#0D0F14', border: '1px solid #151920', borderRadius: 16, padding: '28px 24px', display: 'flex', alignItems: 'center', gap: 16, transition: 'border-color 0.2s' }}
        onMouseEnter={e => e.currentTarget.style.borderColor = 'rgba(34,197,94,0.3)'}
        onMouseLeave={e => e.currentTarget.style.borderColor = '#151920'}
      >
        <div style={{ width: 44, height: 44, borderRadius: 11, background: 'rgba(34,197,94,0.1)', border: '1px solid rgba(34,197,94,0.2)', display: 'grid', placeItems: 'center', flexShrink: 0 }}>
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="#22C55E"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946.003-6.556 5.338-11.891 11.893-11.891 3.181.001 6.167 1.24 8.413 3.488 2.245 2.248 3.481 5.236 3.48 8.414-.003 6.557-5.338 11.892-11.894 11.892-1.99-.001-3.951-.5-5.688-1.448l-6.305 1.654zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.434 9.889-9.885.002-5.462-4.433-9.89-9.889-9.89-5.452 0-9.887 4.428-9.888 9.891 0 2.098.61 4.13 1.737 5.932l-.985 3.628 3.743-.981z"/></svg>
        </div>
        <div>
          <h3 style={{ fontWeight: 800, fontSize: 15, color: '#E5E7EB', marginBottom: 4 }}>Chat WhatsApp</h3>
          <p style={{ fontSize: 12, color: '#4B5563', lineHeight: 1.5 }}>Bantuan install, troubleshoot, remote via AnyDesk</p>
        </div>
        <a href="https://wa.me/6285121309829" target="_blank" rel="noopener noreferrer" style={{ marginLeft: 'auto', background: '#15803D', color: '#fff', padding: '10px 18px', borderRadius: 10, fontSize: 12, fontWeight: 700, textDecoration: 'none', whiteSpace: 'nowrap', transition: 'filter 0.15s' }}
          onMouseEnter={e => e.currentTarget.style.filter='brightness(1.15)'}
          onMouseLeave={e => e.currentTarget.style.filter='none'}
        >Hubungi</a>
      </div>
      <div style={{ background: '#0D0F14', border: '1px solid #151920', borderRadius: 16, padding: '28px 24px', display: 'flex', alignItems: 'center', gap: 16, transition: 'border-color 0.2s' }}
        onMouseEnter={e => e.currentTarget.style.borderColor = 'rgba(255,209,0,0.25)'}
        onMouseLeave={e => e.currentTarget.style.borderColor = '#151920'}
      >
        <div style={{ width: 44, height: 44, borderRadius: 11, background: 'rgba(255,209,0,0.08)', border: '1px solid rgba(255,209,0,0.15)', display: 'grid', placeItems: 'center', flexShrink: 0 }}>
          <svg width="20" height="20" fill="none" stroke="#FFD100" viewBox="0 0 24 24" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
        </div>
        <div>
          <h3 style={{ fontWeight: 800, fontSize: 15, color: '#E5E7EB', marginBottom: 4 }}>FAQ & Tutorial</h3>
          <p style={{ fontSize: 12, color: '#4B5563', lineHeight: 1.5 }}>Panduan lengkap install game dan troubleshooting</p>
        </div>
        <a href="FAQ.html" style={{ marginLeft: 'auto', background: 'rgba(255,209,0,0.1)', border: '1px solid rgba(255,209,0,0.2)', color: '#FFD100', padding: '10px 18px', borderRadius: 10, fontSize: 12, fontWeight: 700, textDecoration: 'none', whiteSpace: 'nowrap', transition: 'all 0.2s' }}
          onMouseEnter={e => { e.currentTarget.style.background='rgba(255,209,0,0.18)'; }}
          onMouseLeave={e => { e.currentTarget.style.background='rgba(255,209,0,0.1)'; }}
        >Lihat FAQ</a>
      </div>
    </div>
  </section>
);

/* ── App root ───────────────────────────────── */
const App = () => {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  return (
    <>
      <NavBar />
      <Hero />
      {t.showWinning && <WinningProduct />}
      <BentoFeatures />
      <Catalog />
      {t.showBlog && <BlogSection />}
      <CTABanner />
      <ContactSection />
      <Footer />

      <TweaksPanel>
        <TweakSection label="Section Visibility" />

        <TweakToggle label="Winning Product Spotlight" value={t.showWinning} onChange={v => setTweak('showWinning', v)} />
        <TweakToggle label="Blog & News Section" value={t.showBlog} onChange={v => setTweak('showBlog', v)} />
      </TweaksPanel>
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<template id="__bundler_thumbnail">
  <svg viewBox="0 0 120 80" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect width="120" height="80" fill="#0D0F14"/>
    <rect x="0" y="0" width="120" height="6" fill="#080A0E"/>
    <rect x="20" y="1.5" width="16" height="3" rx="1.5" fill="#FFD100"/>
    <rect x="42" y="1.5" width="20" height="3" rx="1.5" fill="#EF4444" fill-opacity=".4"/>
    <rect x="20" y="20" width="80" height="6" rx="2" fill="#F3F4F6" fill-opacity=".7"/>
    <rect x="30" y="30" width="60" height="3" rx="1.5" fill="#6B7280" fill-opacity=".5"/>
    <rect x="35" y="38" width="22" height="8" rx="4" fill="#FFD100"/>
    <rect x="60" y="38" width="22" height="8" rx="4" fill="#8B5CF6" fill-opacity=".5"/>
    <rect x="10" y="55" width="44" height="20" rx="4" fill="#3B0764" fill-opacity=".6"/>
    <rect x="58" y="55" width="52" height="20" rx="4" fill="#111317"/>
    <rect x="62" y="59" width="24" height="3" rx="1" fill="#F3F4F6" fill-opacity=".5"/>
    <rect x="62" y="65" width="18" height="2" rx="1" fill="#6B7280" fill-opacity=".3"/>
  </svg>
</template>
</body>
</html>
