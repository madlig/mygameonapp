## Tips Optimasi

**1. Update Driver GPU** — Selalu gunakan driver terbaru dari NVIDIA atau AMD.

**2. Matikan Startup Programs** — Buka Task Manager → Startup, disable semua yang tidak perlu.

**3. Game Mode Windows** — Aktifkan di Settings → Gaming → Game Mode.

**4. Set Power Plan ke High Performance** — Control Panel → Power Options.

**5. Turunkan Resolusi In-Game** — Dari 1080p ke 720p bisa naikin FPS 40-60%.

**6. Matikan V-Sync** — Kecuali kamu mengalami screen tearing yang parah.

**7. Bersihkan Temp Files** — Ketik %temp% di Run, hapus semua isinya.

**8. Defrag HDD** — Kalau masih pakai HDD, defrag secara berkala.

**9. Tambah Virtual Memory** — Set virtual memory ke 1.5x RAM fisik.

**10. Tutup Background Apps** — Discord, Chrome, dan browser lain makan RAM banyak.

Kombinasi semua tips di atas bisa meningkatkan FPS 20-40% tergantung kondisi PC kamu!`

      </div>

      {/* Newsletter-style CTA */}
      <div style={{ background: 'linear-gradient(135deg, #0D0F14 0%, #110D1E 100%)', border: '1px solid rgba(139,92,246,0.15)', borderRadius: 14, padding: '20px 16px', position: 'relative', overflow: 'hidden' }}>
        <div style={{ position: 'absolute', top: -30, right: -30, width: 100, height: 100, background: 'rgba(139,92,246,0.15)', borderRadius: '50%', filter: 'blur(30px)', pointerEvents: 'none' }} />
        <p style={{ position: 'relative', fontSize: 13, fontWeight: 800, color: '#E5E7EB', marginBottom: 6 }}>Game belum ada?</p>
        <p style={{ position: 'relative', fontSize: 11.5, color: '#4B5563', marginBottom: 14, lineHeight: 1.5 }}>Request langsung dan kami carikan untukmu.</p>
        <a href="Request Game.html" style={{ position: 'relative', display: 'block', textAlign: 'center', background: '#FFD100', color: '#0D0F14', padding: '10px', borderRadius: 9, fontSize: 12, fontWeight: 800, textDecoration: 'none' }}>Request Game</a>
      </div>
    </aside>
  );
};

/* ── Article Reader ──────────────────────────────────── */
const ArticleReader = ({ article, allArticles, onBack, onArticleClick }) => {
  const related = allArticles.filter(a => a.id !== article.id && a.category === article.category).slice(0, 2);
  return (
    <div style={{ maxWidth: 720, margin: '0 auto', padding: '48px 24px 80px' }}>
      {/* Back */}
      <button onClick={onBack} style={{ background: 'none', border: 'none', color: '#4B5563', fontSize: 13, fontWeight: 600, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 6, marginBottom: 32, padding: 0, transition: 'color 0.15s' }}
        onMouseEnter={e => e.currentTarget.style.color='#F3F4F6'}
        onMouseLeave={e => e.currentTarget.style.color='#4B5563'}
      >
        <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M15 19l-7-7 7-7" /></svg>
        Kembali ke Blog
      </button>

      {/* Cover */}
      <div style={{ height: 240, background: `linear-gradient(135deg, ${article.coverGradient.join(',')})`, borderRadius: 18, marginBottom: 28, position: 'relative', overflow: 'hidden' }}>
        <div style={{ position: 'absolute', inset: 0, opacity: 0.04, backgroundImage: 'radial-gradient(circle, rgba(255,255,255,0.4) 1px, transparent 1px)', backgroundSize: '20px 20px' }} />
      </div>

      {/* Meta */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 18, flexWrap: 'wrap' }}>
        <span style={{ background: article.categoryColor + '18', color: article.categoryColor, fontSize: 10, fontWeight: 800, padding: '4px 10px', borderRadius: 5 }}>{article.category.toUpperCase()}</span>
        <span style={{ fontSize: 12, color: '#2A2F39' }}>{article.date} · {article.readTime} baca</span>
        <span style={{ fontSize: 12, color: '#2A2F39' }}>oleh {article.author}</span>
      </div>

      {/* Title */}
      <h1 style={{ fontSize: 'clamp(26px, 3.5vw, 40px)', fontWeight: 900, letterSpacing: '-1.2px', lineHeight: 1.15, marginBottom: 28, color: '#F3F4F6' }}>{article.title}</h1>

      {/* Body */}
      <div style={{ background: '#080A0E', border: '1px solid #151920', borderRadius: 16, padding: 'clamp(20px, 3vw, 32px)' }}>
        {article.body.split('\n\n').map((block, i) => {
          if (block.startsWith('## ')) {
            return <h2 key={i} style={{ fontSize: 18, fontWeight: 800, color: '#E5E7EB', marginTop: i > 0 ? 28 : 0, marginBottom: 12, letterSpacing: '-0.3px' }}>{block.slice(3)}</h2>;
          }
          const lines = block.split('\n');
          return (
            <div key={i} style={{ marginBottom: 16 }}>
              {lines.map((line, j) => {
                if (line.startsWith('- **') || line.startsWith('**')) {
                  const parts = line.replace(/^\- /, '').split('**').filter(Boolean);
                  return <p key={j} style={{ fontSize: 14, color: '#6B7280', lineHeight: 1.85, marginBottom: 4 }}>
                    {line.startsWith('- ') && <span style={{ color: '#FFD100', marginRight: 6 }}>•</span>}
                    {parts.map((p, k) => k % 2 === 0 ? <strong key={k} style={{ color: '#C8CFDA', fontWeight: 700 }}>{p}</strong> : <span key={k}>{p}</span>)}
                  </p>;
                }
                return <p key={j} style={{ fontSize: 14, color: '#6B7280', lineHeight: 1.85 }}>{line}</p>;
              })}
            </div>
          );
        })}
      </div>

      {/* Share / CTA */}
      <div style={{ marginTop: 28, display: 'flex', gap: 10 }}>
        <a href="Request Game.html" style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8, background: '#FFD100', color: '#0D0F14', padding: '13px', borderRadius: 11, fontWeight: 700, fontSize: 13, textDecoration: 'none' }}>Request Game</a>
        <a href="Landing Page v2.html#catalog" style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', background: '#080A0E', border: '1px solid #151920', color: '#6B7280', padding: '13px', borderRadius: 11, fontWeight: 600, fontSize: 13, textDecoration: 'none', transition: 'border-color 0.15s' }}
          onMouseEnter={e => e.currentTarget.style.borderColor='rgba(255,209,0,0.3)'}
          onMouseLeave={e => e.currentTarget.style.borderColor='#151920'}
        >Lihat Katalog</a>
      </div>

      {/* Related */}
      {related.length > 0 && (
        <div style={{ marginTop: 48 }}>
          <h3 style={{ fontSize: 14, fontWeight: 800, color: '#6B7280', letterSpacing: '1px', textTransform: 'uppercase', marginBottom: 16 }}>Artikel Terkait</h3>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(240px, 1fr))', gap: 12 }}>
            {related.map(a => <ArticleCard key={a.id} article={a} onClick={onArticleClick} />)}
          </div>
        </div>
      )}
    </div>
  );
};

/* ── Blog App ────────────────────────────────────────── */
const BlogApp = () => {
  const [activeCategory, setActiveCategory] = useState('Semua');
  const [reading, setReading] = useState(null);
  const [searchQ, setSearchQ] = useState('');

  const filtered = ARTICLES.filter(a => {
    const catMatch = activeCategory === 'Semua' || a.category === activeCategory;
    const searchMatch = !searchQ || a.title.toLowerCase().includes(searchQ.toLowerCase()) || a.excerpt.toLowerCase().includes(searchQ.toLowerCase());
    return catMatch && searchMatch;
  });

  const featured = ARTICLES.find(a => a.featured);
  const nonFeatured = filtered.filter(a => !a.featured || activeCategory !== 'Semua');

  const openArticle = (a) => { setReading(a); window.scrollTo(0, 0); };
  const goHome = () => { setReading(null); window.scrollTo(0, 0); };

  if (reading) {
    return (
      <div style={{ minHeight: '100vh', background: '#0D0F14' }}>
        <BlogNav onHome={goHome} />
        <ArticleReader article={reading} allArticles={ARTICLES} onBack={goHome} onArticleClick={openArticle} />
        <footer style={{ borderTop: '1px solid #111317', padding: '20px 24px', textAlign: 'center' }}>
          <p style={{ fontSize: 11, color: '#1F2937' }}>© {new Date().getFullYear()} MyGameON Hub</p>
        </footer>
      </div>
    );
  }

  return (
    <div style={{ minHeight: '100vh', background: '#0D0F14' }}>
      <BlogNav onHome={goHome} />

      <div style={{ maxWidth: 1100, margin: '0 auto', padding: '36px 24px 80px' }}>
        {/* Header */}
        <div style={{ marginBottom: 28 }}>
          <h1 style={{ fontSize: 'clamp(30px, 3.5vw, 44px)', fontWeight: 900, letterSpacing: '-1.5px', lineHeight: 1.05, marginBottom: 8 }}>
            Blog & <span style={{ background: 'linear-gradient(135deg, #F97316, #EF4444)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent', backgroundClip: 'text' }}>Update</span>
          </h1>
          <p style={{ color: '#4B5563', fontSize: 14.5 }}>Info terkini, tips, tutorial, dan update game dari tim MyGameON.</p>
        </div>

        {/* Category bar + search */}
        <div className="cat-bar" style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 28, flexWrap: 'wrap' }}>
          {CATEGORIES.map(cat => (
            <button key={cat} onClick={() => setActiveCategory(cat)}
              style={{ padding: '8px 16px', borderRadius: 9, fontSize: 12, fontWeight: 700, cursor: 'pointer', border: activeCategory === cat ? 'none' : '1px solid #151920', transition: 'all 0.15s', whiteSpace: 'nowrap',
                background: activeCategory === cat ? '#FFD100' : '#080A0E',
                color: activeCategory === cat ? '#0D0F14' : '#4B5563',
              }}
            >{cat}</button>
          ))}
          <div style={{ flex: 1 }} />
          <div style={{ position: 'relative', minWidth: 180 }}>
            <svg style={{ position: 'absolute', left: 10, top: '50%', transform: 'translateY(-50%)' }} width="13" height="13" fill="none" stroke="#374151" viewBox="0 0 24 24" strokeWidth="2"><circle cx="11" cy="11" r="8" /><path d="M21 21l-4.35-4.35" strokeLinecap="round" /></svg>
            <input value={searchQ} onChange={e => setSearchQ(e.target.value)} placeholder="Cari artikel..."
              style={{ width: '100%', padding: '8px 12px 8px 32px', background: '#080A0E', border: '1px solid #151920', borderRadius: 9, color: '#F3F4F6', fontSize: 12, outline: 'none', fontFamily: 'inherit', transition: 'border-color 0.2s' }}
              onFocus={e => e.target.style.borderColor='rgba(255,209,0,0.35)'}
              onBlur={e => e.target.style.borderColor='#151920'}
            />
          </div>
        </div>

        {/* Featured hero */}
        {activeCategory === 'Semua' && !searchQ && featured && (
          <div style={{ marginBottom: 28 }}>
            <HeroArticle article={featured} onClick={openArticle} />
          </div>
        )}

        {/* Main + Sidebar */}
        <div className="blog-layout" style={{ display: 'grid', gridTemplateColumns: '1fr 280px', gap: 20 }}>
          {/* Main */}
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(250px, 1fr))', gap: 12, alignContent: 'start' }}>
            {nonFeatured.length > 0 ? nonFeatured.map(a => (
              <ArticleCard key={a.id} article={a} onClick={openArticle} />
            )) : (
              <div style={{ gridColumn: '1/-1', textAlign: 'center', padding: '48px 0' }}>
                <p style={{ color: '#2A2F39', fontSize: 13 }}>Tidak ada artikel yang cocok.</p>
              </div>
            )}
          </div>
          {/* Sidebar */}
          <Sidebar articles={ARTICLES} onArticleClick={openArticle} />
        </div>
      </div>

      <footer style={{ borderTop: '1px solid #111317', padding: '20px 24px', textAlign: 'center' }}>
        <p style={{ fontSize: 11, color: '#1F2937' }}>© {new Date().getFullYear()} MyGameON Hub</p>
      </footer>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<BlogApp />);
</script>
</body>
</html>
